<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0b1024"/>
  <!-- Starburst rays -->
  <g transform="translate(16,16)" stroke="#ad8a4d" stroke-linecap="round">
    <line x1="0" y1="-13" x2="0" y2="-8" stroke-width="1.5"/>
    <line x1="0" y1="8" x2="0" y2="13" stroke-width="1.5"/>
    <line x1="-13" y1="0" x2="-8" y2="0" stroke-width="1.5"/>
    <line x1="8" y1="0" x2="13" y2="0" stroke-width="1.5"/>
    <line x1="-9.2" y1="-9.2" x2="-5.6" y2="-5.6" stroke-width="1.5"/>
    <line x1="5.6" y1="5.6" x2="9.2" y2="9.2" stroke-width="1.5"/>
    <line x1="9.2" y1="-9.2" x2="5.6" y2="-5.6" stroke-width="1.5"/>
    <line x1="-5.6" y1="5.6" x2="-9.2" y2="9.2" stroke-width="1.5"/>
    <!-- Center star dot -->
    <circle cx="0" cy="0" r="2.5" fill="#ad8a4d"/>
    <circle cx="0" cy="0" r="1.2" fill="#efe6d2"/>
  </g>
</svg>
